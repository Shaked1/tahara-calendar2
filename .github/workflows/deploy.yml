name: Deploy Edge Function

on:
  push:
    branches:
      - main  # ודאי שזהו שם הענף שלך (אם זה master, שני ל-master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Function
        # הוספנו את הנתיב ל-import-map כדי לפתור את בעיית ה-Module not found
        run: supabase functions deploy send-notifications --project-ref btqrmltqiphqvefakyvv --no-verify-jwt --import-map supabase/functions/import_map.json
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}